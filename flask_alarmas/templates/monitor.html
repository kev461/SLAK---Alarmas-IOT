<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- Librerías: Socket.IO para tiempo real y Chart.js para gráficas -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-monitor { transition: all 0.5s ease; border-width: 3px; }
        .nivel-1 { background-color: #d4edda; border-color: #28a745; color: #155724; } /* Verde - Normal */
        .nivel-2 { background-color: #fff3cd; border-color: #ffc107; color: #856404; } /* Amarillo - Alerta */
        .nivel-3 { background-color: #f8d7da; border-color: #dc3545; color: #721c24; animation: blinker 1s linear infinite; } /* Rojo - Crítico */
        @keyframes blinker { 50% { opacity: 0.7; } }
        .sensor-val { font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container mt-4">
        <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h1>SLAK IoT Monitor</h1>
            <span id="conn-status" class="badge bg-danger">Desconectado</span>
        </header>
        
        <div class="row">
            <!-- Tarjeta de Estado de Riesgo -->
            <div class="col-md-4">
                <div id="status-card" class="card card-monitor h-100 shadow text-dark bg-secondary">
                    <div class="card-header text-center"><h5>ESTADO DEL SISTEMA</h5></div>
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <h2 id="danger-label" class="display-6">ESPERANDO...</h2>
                        <p class="h3">Nivel: <span id="danger-level">-</span></p>
                        <div class="mt-4 text-start px-3">
                            <p>🔥 Llama: <span id="val-llama" class="sensor-val">-</span></p>
                            <p>💨 Humo: <span id="val-humo" class="sensor-val">-</span></p>
                            <p>👤 Mov: <span id="val-mov" class="sensor-val">-</span></p>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <small id="last-update" class="text-muted">Sin datos</small>
                    </div>
                </div>
            </div>

            <!-- Gráfico Real-Time -->
            <div class="col-md-8">
                <div class="card bg-light text-dark shadow h-100">
                    <div class="card-body">
                        <canvas id="iotChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const ctx = document.getElementById('iotChart').getContext('2d');
        
        // Configuración de la gráfica
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Temperatura °C', data: [], borderColor: '#ff6384', tension: 0.3, yAxisID: 'y' },
                    { label: 'Puntos Peligro', data: [], borderColor: '#9966ff', backgroundColor: 'rgba(153, 102, 255, 0.2)', fill: true, yAxisID: 'y1' }
                ]
            },
            options: { 
                scales: { 
                    y: { type: 'linear', display: true, position: 'left', title: {display:true, text:'Temp'} },
                    y1: { type: 'linear', display: true, position: 'right', grid: {drawOnChartArea: false}, title: {display:true, text:'Puntos'} }
                } 
            }
        });

        socket.on('connect', () => {
            document.getElementById('conn-status').className = "badge bg-success";
            document.getElementById('conn-status').innerText = "Conectado";
        });

        // ESCUCHAR INYECCIÓN DESDE EL SCRIPT DE ARDUINO
        socket.on('actualizar_dashboard', function(data) {
            const card = document.getElementById('status-card');
            const label = document.getElementById('danger-label');
            const level = document.getElementById('danger-level');
            
            // Actualizar Colores y Textos según el nuevo Nivel (1 a 3)
            card.classList.remove('nivel-1', 'nivel-2', 'nivel-3', 'bg-secondary');
            card.classList.add(`nivel-${data.nivel_peligro}`);
            
            const etiquetas = { 1: "NORMAL", 2: "ALERTA", 3: "PELIGRO CRÍTICO" };
            label.innerText = etiquetas[data.nivel_peligro] || "DESCONOCIDO";
            level.innerText = data.nivel_peligro;

            // Actualizar Sensores
            document.getElementById('val-humo').innerText = data.humo === 1 ? "SÍ" : "NO";
            document.getElementById('val-llama').innerText = data.llama === 1 ? "SÍ" : "NO";
            document.getElementById('val-mov').innerText = data.movimiento === 1 ? "DETECTADO" : "SIN MOV.";
            document.getElementById('last-update').innerText = "Último: " + new Date().toLocaleTimeString();

            // Actualizar Gráfica
            const timestamp = new Date().toLocaleTimeString();
            chart.data.labels.push(timestamp);
            chart.data.datasets[0].data.push(data.temperatura);
            chart.data.datasets[1].data.push(data.puntos_peligro);

            // Mantener solo los últimos 15 puntos
            if (chart.data.labels.length > 15) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(d => d.data.shift());
            }
            chart.update();
        });

        socket.on('disconnect', () => {
            document.getElementById('conn-status').className = "badge bg-danger";
            document.getElementById('conn-status').innerText = "Desconectado";
        });
    </script>
</body>
</html>
