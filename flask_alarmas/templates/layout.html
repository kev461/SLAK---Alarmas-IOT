<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'Slak HOME SYNC | Seguridad y Calma' }}</title>

    <!-- Fuentes: Inter para modernismo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top transition-all">
        <div class="container py-1">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <div style="width: 12px; height: 12px; background-color: var(--canela-suave); border-radius: 50%;">
                </div>
                SLAK HOME SYNC
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link py-3" href="{{ url_for('index') }}">Arquitectura</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-3" href="{{ url_for('monitor') }}">Monitor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-3" href="{{ url_for('administrar_correos') }}">Gestión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main style="padding-top: 80px; min-height: 85vh;">
        {% block body %}
        {% endblock %}
    </main>

    <footer>
        <div class="container text-center">
            <div class="mb-4">
                <div style="width: 40px; height: 2px; background-color: var(--canela-suave); margin: 0 auto;"></div>
            </div>
            <p class="mb-2 fw-semibold" style="letter-spacing: 0.2em;">© 2026 SLAK HOME SYNC</p>
            <p class="mb-0 text-muted" style="font-size: 0.75rem; letter-spacing: 0.1em;">Pensado para tu tranquilidad
                en casa o en el exterior</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Efecto sombra en navbar al hacer scroll
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.navbar');
            if (window.scrollY > 10) {
                nav.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.15)';
            } else {
                nav.style.boxShadow = '0 4px 30px rgba(0, 0, 0, 0.1)';
            }
        });
    </script>
</body>

</html>
