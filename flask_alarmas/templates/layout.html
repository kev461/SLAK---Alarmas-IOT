<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'Alarmas IOT' }}</title>
    
    <!-- Fuentes: Inter para modernismo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">Slak IoT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Arquitectura</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('monitor') }}">Monitor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('administrar_correos') }}">Gestión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block body %}
        {% endblock %}
    </main>

    <footer class="text-center">
        <div class="container">
            <p>© 2026 Slak IoT - Seguridad y Calma</p>
            <small>Inspirado en el Modernismo del Desierto</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
