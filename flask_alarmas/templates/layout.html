<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'Slak HOME SYNC | Seguridad y Calma' }}</title>

    <!-- Fuentes: Inter para modernismo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top transition-all">
        <div class="container py-1">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <div style="width: 12px; height: 12px; background-color: var(--canela-suave); border-radius: 50%;">
                </div>
                SLAK HOME SYNC
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link py-3" href="{{ url_for('index') }}">Arquitectura</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-3" href="{{ url_for('monitor') }}">Monitor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-3" href="{{ url_for('administrar_correos') }}">Gestión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main style="padding-top: 80px; min-height: 85vh;">
        {% block body %}
        {% endblock %}
    </main>

    <!-- Botón Flotante IOT -->
    <button type="button" class="btn shadow-lg rounded-circle d-flex align-items-center justify-content-center" 
        style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; z-index: 1050; background-color: var(--marron-grafito, #333); color: white; border: none;"
        data-bs-toggle="modal" data-bs-target="#iotModal">
        <i class="fas fa-microchip"></i>
    </button>

    <!-- Modal de Control IOT -->
    <div class="modal fade" id="iotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 0; background-color: #fdfdfd;">
                <div class="modal-header border-0 pb-0">
                    <span class="monitor-label" style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--arena-nuez, #C1AA8D);">CONTROL REMOTO HC-05</span>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 pt-2">
                    <h2 class="fw-bold mb-4" style="color: var(--marron-grafito, #333); border: none;">Dispositivos</h2>
                    
                    <div class="d-flex justify-content-center gap-5 text-center py-3"></div>
                        <!-- Control Luz -->
                        <div class="d-flex flex-column align-items-center">
                            <span class="monitor-label mb-3">Iluminación</span>
                            <button id="btnLuzIot" class="btn rounded-circle d-flex align-items-center justify-content-center shadow-sm border-0" 
                                style="width: 100px; height: 100px; font-size: 1.8rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                                <i class="fas fa-lightbulb"></i>
                            </button>
                            <span id="stateLuz" class="monitor-label mt-3" style="font-size: 0.65rem; color: var(--marron-grafito);">APAGADO</span>
                        </div>

                        <!-- Control Ventilador -->
                        <div class="d-flex flex-column align-items-center">
                            <span class="monitor-label mb-3">Ventilación</span>
                            <button id="btnVentIot" class="btn rounded-circle d-flex align-items-center justify-content-center shadow-sm border-0" 
                                style="width: 100px; height: 100px; font-size: 1.8rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                                <i class="fas fa-fan"></i>
                            </button>
                            <span id="stateVent" class="monitor-label mt-3" style="font-size: 0.65rem; color: var(--marron-grafito);">APAGADO</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <div class="mb-4">
                <div style="width: 40px; height: 2px; background-color: var(--canela-suave); margin: 0 auto;"></div>
            </div>
            <p class="mb-2 fw-semibold" style="letter-spacing: 0.2em;">© 2026 SLAK HOME SYNC</p>
            <p class="mb-0 text-muted" style="font-size: 0.75rem; letter-spacing: 0.1em;">Pensado para tu tranquilidad
                en casa o en el exterior</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Efecto sombra en navbar al hacer scroll
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.navbar');
            if (window.scrollY > 10) {
                nav.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.15)';
            } else {
                nav.style.boxShadow = '0 4px 30px rgba(0, 0, 0, 0.1)';
            }
        });

        // Lógica de Control IOT
        let currentLuz = 0; // 0: Off, 1: Auto, 2: On
        let currentVent = 0; // 0: Off, 1: On

        const configLuz = [
            { text: "APAGADO", color: "#C1AA8D", textColor: "white" },   // arena-nuez
            { text: "AUTOMÁTICO", color: "#D4A373", textColor: "white" }, // canela-suave
            { text: "ENCENDIDO", color: "#B15636", textColor: "white" }   // ambar-oxido
        ];

        const configVent = [
            { text: "APAGADO", color: "#C1AA8D", textColor: "white" },
            { text: "ENCENDIDO", color: "#B15636", textColor: "white" }
        ];

        function updateIotUI() {
            const btnLuz = document.getElementById('btnLuzIot');
            const spanLuz = document.getElementById('stateLuz');
            const btnVent = document.getElementById('btnVentIot');
            const spanVent = document.getElementById('stateVent');

            // Actualizar Luz
            btnLuz.style.backgroundColor = configLuz[currentLuz].color;
            btnLuz.style.color = configLuz[currentLuz].textColor;
            spanLuz.innerText = configLuz[currentLuz].text;
            
            // Efecto de brillo si está encendido
            btnLuz.style.boxShadow = currentLuz === 2 ? `0 0 20px ${configLuz[2].color}88` : 'none';

            // Actualizar Ventilador
            btnVent.style.backgroundColor = configVent[currentVent].color;
            btnVent.style.color = configVent[currentVent].textColor;
            spanVent.innerText = configVent[currentVent].text;

            // Animación de rotación para el ventilador si está ON
            const iconVent = btnVent.querySelector('i');
            if (currentVent === 1) iconVent.classList.add('fa-spin');
            else iconVent.classList.remove('fa-spin');
        }

        async function sendIotCommand() {
            try {
                const response = await fetch('/enviar_datos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ luz: currentLuz, ventilador: currentVent })
                });
                const data = await response.json();
                console.log("Comando enviado:", data.comando);
            } catch (error) {
                console.error("Error al enviar comando IOT:", error);
            }
        }

        document.getElementById('btnLuzIot').addEventListener('click', () => {
            currentLuz = (currentLuz + 1) % 3;
            updateIotUI();
            sendIotCommand();
        });

        document.getElementById('btnVentIot').addEventListener('click', () => {
            currentVent = (currentVent + 1) % 2;
            updateIotUI();
            sendIotCommand();
        });

        // Inicialización visual
        updateIotUI();
    </script>
</body>

</html>
